name: CI

on:
  push:
  #  branches: [main]
  pull_request:
    #branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependecies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -m py_compile \
          app.py \
          config.py \
          services/ingest.py \
          services/run_log.py \
          services/run_log_snowflake.py \
          services/snowflake_loader.py \
          services/data_quality.py
